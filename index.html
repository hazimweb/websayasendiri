<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hazim Web Desain</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050816;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND GLOW */
body::before{
  content:'';
  position:fixed;
  width:500px;
  height:500px;
  background:#0d6efd30;
  filter:blur(120px);
  top:-150px;
  left:-100px;
  z-index:-1;
}

body::after{
  content:'';
  position:fixed;
  width:400px;
  height:400px;
  background:#ffc10725;
  filter:blur(120px);
  bottom:-150px;
  right:-100px;
  z-index:-1;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:80px 8%;
  gap:60px;
  flex-wrap:wrap;
}

/* TEXT */
.hero-text{
  flex:1;
  min-width:300px;
  animation:fadeUp 1s ease;
}

.hero-text h1{
  font-size:60px;
  line-height:1.2;
  font-weight:800;
  margin-bottom:20px;
}

.hero-text span{
  color:#ffc107;
}

.hero-text p{
  color:#b9b9b9;
  line-height:1.8;
  margin-bottom:30px;
  max-width:600px;
}

/* BUTTON */
.btn{
  display:inline-block;
  padding:14px 35px;
  background:linear-gradient(135deg,#0d6efd,#0057d8);
  border-radius:12px;
  text-decoration:none;
  color:white;
  font-weight:600;
  transition:.3s;
  box-shadow:0 10px 30px rgba(13,110,253,.35);
}

.btn:hover{
  transform:translateY(-4px);
}

/* IMAGE */
.hero-image{
  flex:1;
  min-width:300px;
  display:flex;
  justify-content:center;
}

/* 🔥 LOGO ANIMASI */
.hero-image img{
  max-width:320px;

  animation:
    float 4s ease-in-out infinite,
    glow 3s ease-in-out infinite,
    fadeIn 1s ease;

}

/* FLOAT */
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
  100%{transform:translateY(0)}
}

/* GLOW */
@keyframes glow{
  0%{filter:drop-shadow(0 0 10px rgba(255,193,7,0.2))}
  50%{filter:drop-shadow(0 0 35px rgba(255,193,7,0.7))}
  100%{filter:drop-shadow(0 0 10px rgba(255,193,7,0.2))}
}

/* FADE */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

/* MOBILE */
@media(max-width:900px){
  .hero{
    flex-direction:column;
    text-align:center;
  }

  .hero-text h1{
    font-size:42px;
  }
}
</style>

</head>

<body>

<section class="hero">

  <div class="hero-text">

    <h1>
      Dari Pesantren ke Dunia Digital <br>
      <span>Membangun Karya</span> yang Bermakna
    </h1>

    <p>
      Saya merupakan alumni Pondok Pesantren Lirboyo yang sedang menekuni 
      pengembangan website profesional dengan pendekatan modern.
      <br><br>
      Membawa nilai kejujuran, ketelitian, dan tanggung jawab dalam setiap karya digital.
    </p>

    <a href="home.html" class="btn">
      Lihat Portofolio Saya →
    </a>

  </div>

  <div class="hero-image">
    <img src="logo.png" alt="Hazim Logo">
  </div>

</section>

</body>
</html>
