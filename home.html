<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hazim Web Desain</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
      scroll-behavior:smooth;
    }

    body{
      background:#050816;
      color:white;
      overflow-x:hidden;
    }

    body::before{
      content:'';
      position:fixed;
      width:500px;
      height:500px;
      background:#0d6efd30;
      filter:blur(120px);
      top:-150px;
      left:-100px;
      z-index:-1;
    }

    body::after{
      content:'';
      position:fixed;
      width:400px;
      height:400px;
      background:#ffc10725;
      filter:blur(120px);
      bottom:-150px;
      right:-100px;
      z-index:-1;
    }

    header{
      width:100%;
      padding:20px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:fixed;
      top:0;
      left:0;
      background:rgba(5,8,22,.75);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.08);
      z-index:999;
    }

    .logo{
      font-size:28px;
      font-weight:800;
      color:white;
    }

    .logo span{
      color:#ffc107;
    }

    nav a{
      color:#d8d8d8;
      text-decoration:none;
      margin-left:28px;
      font-weight:500;
      transition:.3s;
    }

    nav a:hover{
      color:#ffc107;
    }

    .hero{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:130px 8% 80px;
      gap:60px;
      flex-wrap:wrap;
    }

    .hero-text h1{
      font-size:65px;
      margin-bottom:20px;
      font-weight:800;
    }

    .hero-text h1 span{
      color:#ffc107;
    }

    .hero-text p{
      color:#b9b9b9;
      margin-bottom:35px;
    }

    .btn{
      display:inline-block;
      padding:15px 35px;
      background:linear-gradient(135deg,#0d6efd,#0057d8);
      border-radius:14px;
      color:white;
      text-decoration:none;
      font-weight:600;
    }

    section{
      padding:90px 8%;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:25px;
    }

    .card{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      padding:35px;
      position:relative;
    }

    .card h3{
      font-size:28px;
      margin-bottom:10px;
    }

    /* PRICING */

    .old-price{
      text-decoration:line-through;
      color:#888;
      font-size:16px;
    }

    .new-price{
      font-size:42px;
      color:#ffc107;
      font-weight:800;
      margin-bottom:15px;
    }

    .promo-badge{
      position:absolute;
      top:15px;
      right:15px;
      background:#ff3b3b;
      padding:6px 12px;
      font-size:12px;
      border-radius:8px;
    }

    ul{
      list-style:none;
      margin-top:10px;
    }

    ul li{
      margin-bottom:10px;
      color:#d8d8d8;
    }

    /* FLOATING WA */

    .wa-float{
      position:fixed;
      bottom:25px;
      right:25px;
      width:60px;
      height:60px;
      background:#25D366;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:50%;
      z-index:9999;
    }

  </style>
</head>

<body>

<section id="layanan">

  <h2 style="text-align:center;margin-bottom:40px;">Paket Website</h2>

  <div class="cards">

    <div class="card">
      <div class="promo-badge">PROMO</div>
      <h3>Link Bio</h3>
      <div class="old-price">Rp 599K</div>
      <div class="new-price">Rp 299K</div>
      <ul>
        <li>✔ Tampilan modern</li>
        <li>✔ Mobile friendly</li>
      </ul>
    </div>

    <div class="card">
      <div class="promo-badge">BEST DEAL</div>
      <h3>Landing Page</h3>
      <div class="old-price">Rp 700K</div>
      <div class="new-price">Rp 400K</div>
      <ul>
        <li>✔ Desain premium</li>
        <li>✔ Responsive</li>
      </ul>
    </div>

    <div class="card">
      <div class="promo-badge">LIMITED</div>
      <h3>Toko Online</h3>
      <div class="old-price">Rp 800K</div>
      <div class="new-price">Rp 500K</div>
      <ul>
        <li>✔ Katalog produk</li>
        <li>✔ Keranjang belanja</li>
      </ul>
    </div>

  </div>

</section>

<!-- FLOATING WA -->

class="wa-float"
target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30">

</body>
</html>
